name: Sync Rules from Upstream

on:
  schedule:
    # 每周一和周四 UTC 2:00（北京时间 10:00）
    - cron: '0 2 * * 1,4'
  workflow_dispatch:  # 可手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download upstream rules
        run: |
          # ═══════════════════════════════
          # 共享规则 → rules/（Egern + SR 通用）
          # ═══════════════════════════════
          RULES="YouTube YouTubeMusic Netflix Disney HBO TikTok Spotify Microsoft Telegram Twitter WeChat GitHub"
          for r in $RULES; do
            echo "Downloading: rules/${r}.list"
            curl -sL --connect-timeout 15 --max-time 60 \
              "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/${r}/${r}.list" \
              -o "rules/${r}.list"
          done

          # ═══════════════════════════════
          # Shadowrocket 特有 → sr-rules/rule/
          # ═══════════════════════════════
          SR_RULES="Lan GitLab Atlassian China Global"
          for r in $SR_RULES; do
            echo "Downloading: sr-rules/rule/${r}.list"
            curl -sL --connect-timeout 15 --max-time 60 \
              "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/${r}/${r}.list" \
              -o "sr-rules/rule/${r}.list"
          done

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No upstream changes."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync rules from upstream"
          title: "📥 同步上游规则更新"
          body: |
            自动从 [blackmatrix7/ios_rule_script](https://github.com/blackmatrix7/ios_rule_script) 同步规则更新。

            如有变更请检查后合并。
          branch: sync-upstream
          delete-branch: true
          labels: auto-sync
