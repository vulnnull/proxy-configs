name: Sync Rules from Upstream

on:
  schedule:
    - cron: '0 2 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download upstream rules
        run: |
          # ═══════════════════════════════
          # 共享规则 → rules/list/（Surge 格式）
          # ═══════════════════════════════
          UPSTREAM="YouTube YouTubeMusic Netflix Disney HBO TikTok Spotify Microsoft Telegram Twitter WeChat GitHub Lan"
          for r in $UPSTREAM; do
            curl -sL --connect-timeout 15 --max-time 60 \
              "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/${r}/${r}.list" \
              -o "rules/list/${r}.list"
          done

          # ═══════════════════════════════
          # Shadowrocket 特有 → sr-rules/rule/
          # ═══════════════════════════════
          SR="GitLab Atlassian China Global"
          for r in $SR; do
            curl -sL --connect-timeout 15 --max-time 60 \
              "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Shadowrocket/${r}/${r}.list" \
              -o "sr-rules/rule/${r}.list"
          done

      - name: Generate rules from source
        run: |
          python3 scripts/generate.py

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync rules from upstream [auto]"
          git push
