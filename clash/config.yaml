# ==========================================
# 分流规则
# ==========================================
rules:
  # 私人规则（最高优先级）
  - RULE-SET,custom-direct,DIRECT
  - RULE-SET,custom-proxy,Proxy

  # 本地网络
  - RULE-SET,Lan,DIRECT

  # 广告拦截
  - RULE-SET,ADblock,ADblock

  # Apple 服务（直连优先）
  - RULE-SET,Apple,Apple
  - RULE-SET,ApplePush,Proxy

  # AI 服务
  - RULE-SET,AI,AI

  # Google 服务
  - RULE-SET,Google,Foreign

  # 媒体服务
  - RULE-SET,YouTube,Foreign
  - RULE-SET,Netflix,Streaming
  - RULE-SET,Disney,Streaming
  - RULE-SET,HBO,Streaming
  - RULE-SET,TikTok,TikTok
  - RULE-SET,Spotify,Spotify

  # 微软服务
  - RULE-SET,Microsoft,Microsoft

  # 即时通讯
  - RULE-SET,Telegram,Telegram
  - RULE-SET,Twitter,Foreign
  # 代码托管
  - RULE-SET,GitHub,GitHub

  # 地区分流
  - RULE-SET,China,Domestic
  - RULE-SET,Global,Foreign

  # 国内 IP 直连
  - GEOIP,CN,Domestic

  # 兜底
  - MATCH,Final
