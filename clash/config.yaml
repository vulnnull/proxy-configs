# ==========================================
# Clash 配置文件
# 基于: proxy-configs 统一规则
# 更新: 2026.06.02
# ==========================================

# 端口配置
mixed-port: 7890
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# DNS 配置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '+.stun.*.*'
    - '+.stun.*.*.*'
    - '+.stun.*.*.*.*'
    - '+.stun.*.*.*.*.*'
    - 'lens.l.google.com'
    - '*.n.n.srv.nintendo.net'
    - '+.stun.playstation.net'
    - 'xbox.*.*.microsoft.com'
    - '*.*.xboxlive.com'
    - '*.msftncsi.com'
    - '*.msftconnecttest.com'
    - '*.mcdn.bilivideo.cn'
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query

# ==========================================
# 节点订阅提供者
# ==========================================
proxy-providers:
  # 全部节点（请填入订阅链接）
  All: &All
    type: http
    url: ""
    interval: 3600
    path: ./providers/all.yaml
    health-check:
      enable: true
      interval: 600
      url: http://cp.cloudflare.com/generate_204

  # 区域筛选
  HK:
    <<: *All
    filter: "港|🇭🇰|HK|(?i)Hong"
  TW:
    <<: *All
    filter: "台|🇹🇼|TW|(?i)Taiwan"
  JP:
    <<: *All
    filter: "日|🇯🇵|JP|(?i)Japan"
  SG:
    <<: *All
    filter: "坡|🇸🇬|狮城|SG|(?i)Singapore"
  KR:
    <<: *All
    filter: "韩|🇰🇷|KR|(?i)Korea"
  US:
    <<: *All
    filter: "美|🇺🇸|US|(?i)States|(?i)America"

# ==========================================
# 策略组
# ==========================================
proxy-groups:
  # --- 节点选择 ---
  - name: Proxy
    type: select
    proxies:
      - Auto
      - Fallback
      - DIRECT
    use:
      - HK
      - TW
      - JP
      - SG
      - KR
      - US
      - All

  - name: Auto
    type: url-test
    use: [All]
    url: "http://cp.cloudflare.com/generate_204"
    interval: 300

  - name: Fallback
    type: fallback
    use: [All]
    url: "http://cp.cloudflare.com/generate_204"
    interval: 300

  # --- 区域节点（手动选择） ---
  - name: HongKong
    type: select
    use: [HK]
    proxies: [DIRECT]

  - name: TaiWan
    type: select
    use: [TW]
    proxies: [DIRECT]

  - name: Japan
    type: select
    use: [JP]
    proxies: [DIRECT]

  - name: Singapore
    type: select
    use: [SG]
    proxies: [DIRECT]

  - name: Korea
    type: select
    use: [KR]
    proxies: [DIRECT]

  - name: America
    type: select
    use: [US]
    proxies: [DIRECT]

  - name: Others
    type: select
    use: [All]
    proxies: [DIRECT]

  # --- 服务分组 ---
  - name: Domestic
    type: select
    proxies: &Domestic
      - DIRECT
      - Proxy
      - Auto
      - HongKong
      - Japan
      - America

  - name: Foreign
    type: select
    proxies: &Foreign
      - Proxy
      - Auto
      - HongKong
      - Japan
      - America
      - Others
      - DIRECT

  - name: AI
    type: select
    proxies: *Foreign

  - name: Apple
    type: select
    proxies: *Domestic

  - name: Microsoft
    type: select
    proxies: *Domestic

  - name: Telegram
    type: select
    proxies: *Foreign

  - name: GitHub
    type: select
    proxies: *Foreign

  - name: Spotify
    type: select
    proxies: *Foreign

  - name: TikTok
    type: select
    proxies: *Foreign

  - name: Streaming
    type: select
    proxies: *Foreign

  - name: ADblock
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: Final
    type: select
    proxies:
      - Proxy
      - Auto
      - DIRECT

# ==========================================
